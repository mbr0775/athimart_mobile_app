name: athimart
description: Athimart - Where Technology Meets Lifestyle, Fitness & Tradition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # UI & Animations
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0

  # Storage & Preferences
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Utils
  intl: ^0.19.0
  email_validator: ^2.1.17
  connectivity_plus: ^6.0.3
  image_picker: ^1.1.2
  pinput: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/athimartlogo.png
    - assets/icons/app_icon.png
    - assets/images/
    - assets/icons/
    - assets/animations/